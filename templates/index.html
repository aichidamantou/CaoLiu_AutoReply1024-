<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>草榴自动回复 - Web 面板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #0f1923; color: #e0e0e0; height: 100vh; overflow: hidden; }
.container { display: flex; height: 100vh; }
.left { width: 50%; display: flex; flex-direction: column; border-right: 1px solid #1e2d3d; }
.right { width: 50%; display: flex; flex-direction: column; background: #0a0f16; }

.panel { background: #15202b; margin: 8px; border-radius: 8px; border: 1px solid #1e2d3d; overflow: hidden; }
.panel-header { background: #1a2d3d; padding: 8px 14px; font-size: 13px; font-weight: 600; color: #8ab4f8; display: flex; align-items: center; gap: 8px; }
.panel-header .badge { font-size: 10px; background: #2a4a6a; padding: 1px 6px; border-radius: 8px; color: #8ab4f8; }

/* 左上：参数面板 */
.params-panel { flex-shrink: 0; max-height: 320px; }
.params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 10px 14px; font-size: 12px; }
.param-item { display: flex; flex-direction: column; gap: 2px; }
.param-label { color: #8899aa; font-size: 11px; }
.param-value { color: #e0e0e0; font-weight: 500; }
.param-value.user { color: #8ab4f8; }
.param-value.ok { color: #5cd68a; }
.param-value.warn { color: #f5a623; }

/* 日志面板通用 */
.log-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.log-content { flex: 1; overflow-y: auto; padding: 6px 14px; font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; font-size: 11px; line-height: 1.6; background: #0a0f16; }
.log-content::-webkit-scrollbar { width: 4px; }
.log-content::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 2px; }
.log-line { color: #8899aa; white-space: pre-wrap; word-break: break-all; }
.log-line[level="INFO"] { color: #b0bec5; }
.log-line[level="WARNING"] { color: #f5a623; }
.log-line[level="ERROR"] { color: #e74c3c; }
.log-line[level="DEBUG"] { color: #5a7a9a; }

/* 右侧：无痕日志 + 状态栏 */
.incognito-log-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.status-bar { height: 32px; background: #15202b; border-top: 1px solid #1e2d3d; display: flex; align-items: center; padding: 0 14px; font-size: 12px; gap: 16px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.running { background: #5cd68a; box-shadow: 0 0 6px #5cd68a88; }
.status-dot.sleeping { background: #f5a623; box-shadow: 0 0 6px #f5a62388; }
.status-dot.error { background: #e74c3c; box-shadow: 0 0 6px #e74c3c88; }
.status-text { color: #8899aa; }
.status-stat { color: #5cd68a; }

/* 编辑覆盖层 */
.overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.overlay.active { display: flex; }
.overlay-content { background: #15202b; border: 1px solid #2a4a6a; border-radius: 10px; width: 80%; max-width: 700px; max-height: 80vh; display: flex; flex-direction: column; }
.overlay-header { padding: 12px 16px; border-bottom: 1px solid #1e2d3d; font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
.overlay-header .close-btn { background: none; border: none; color: #8899aa; font-size: 20px; cursor: pointer; padding: 0 4px; }
.overlay-header .close-btn:hover { color: #fff; }
.overlay-body { flex: 1; padding: 12px 16px; overflow-y: auto; }
.overlay-body textarea { width: 100%; height: 400px; background: #0a0f16; color: #b0bec5; border: 1px solid #1e2d3d; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 12px; resize: vertical; }
.overlay-footer { padding: 10px 16px; border-top: 1px solid #1e2d3d; display: flex; gap: 8px; justify-content: flex-end; }
.btn { padding: 6px 16px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; }
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:hover { background: #1557b0; }
.btn-secondary { background: #2a3a4a; color: #b0bec5; }
.btn-secondary:hover { background: #3a4a5a; }

</style>
</head>
<body>

<div class="container">
  <!-- 左侧栏 -->
  <div class="left">
    <!-- 参数面板 -->
    <div class="panel params-panel">
      <div class="panel-header">
        📊 运行参数
        <span class="badge" id="runtime-badge">00:00:00</span>
        <button class="btn btn-secondary" style="margin-left:auto;padding:2px 10px;font-size:11px;" onclick="openEditor()">编辑配置</button>
      </div>
      <div class="params-grid" id="params-grid"></div>
    </div>

    <!-- 用户信息面板 -->
    <div class="panel" style="flex-shrink:0;max-height:160px;">
      <div class="panel-header">
        👤 用户信息
        <span class="badge" id="userinfo-time">-</span>
      </div>
      <div style="padding:8px 14px;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:12px;" id="userinfo-content">
        <div><span style="color:#8899aa;">用户</span><br><span id="ui-title" style="color:#8ab4f8;">-</span></div>
        <div><span style="color:#8899aa;">发帖</span><br><span id="ui-posts">-</span></div>
        <div><span style="color:#8899aa;">威望</span><br><span id="ui-pres">-</span></div>
        <div><span style="color:#8899aa;">金钱</span><br><span id="ui-usd">-</span></div>
        <div><span style="color:#8899aa;">贡献</span><br><span id="ui-contribution">-</span></div>
        <div><span style="color:#8899aa;">&nbsp;</span><br><span id="ui-spacer">&nbsp;</span></div>
      </div>
    </div>

    <!-- 时间窗 + 倒计时面板 -->
    <div class="panel" style="flex-shrink:0;max-height:100px;">
      <div class="panel-header">
        ⏰ 定时任务
        <span class="badge" id="work-status-badge">全天</span>
      </div>
      <div style="padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:12px;">
        <span style="color:#8899aa;">每天</span>
        <input type="number" id="work-start" min="0" max="23" value="14" style="width:50px;background:#0a0f16;color:#e0e0e0;border:1px solid #1e2d3d;border-radius:4px;padding:3px 6px;text-align:center;">
        <span style="color:#8899aa;">:00 至</span>
        <input type="number" id="work-end" min="0" max="24" value="22" style="width:50px;background:#0a0f16;color:#e0e0e0;border:1px solid #1e2d3d;border-radius:4px;padding:3px 6px;text-align:center;">
        <span style="color:#8899aa;">:00</span>
        <button class="btn btn-primary" style="padding:3px 10px;font-size:11px;" onclick="saveWorkTime()">保存</button>
        <span id="countdown-display" style="margin-left:auto;color:#f5a623;font-weight:600;font-size:13px;"></span>
      </div>
    </div>

    <!-- 主日志面板 -->
    <div class="panel log-panel">
      <div class="panel-header">
        📝 运行日志
        <span class="badge" id="log-count">0 条</span>
      </div>
      <div class="log-content" id="log-content"></div>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
      <span><span class="status-dot running" id="status-dot"></span> <span class="status-text" id="status-text">启动中</span></span>
      <span class="status-stat" id="status-reply">回复: 0/0</span>
      <span class="status-stat" id="status-today"></span>
      <span class="status-stat" id="status-pending">待回复: 0</span>
    </div>
  </div>

  <!-- 右侧：无痕浏览日志 -->
  <div class="right">

    <!-- 无痕浏览参数 -->
    <div class="panel" style="flex-shrink:0;max-height:170px;">
      <div class="panel-header">
        🕶️ 无痕参数
        <span class="badge" id="incognito-state-badge">未启动</span>
        <button class="btn btn-secondary" style="margin-left:auto;padding:2px 10px;font-size:11px;" onclick="openIncognitoEditor()">编辑</button>
      </div>
      <div class="params-grid" id="incognito-params-grid" style="padding:6px 14px;">
        <div class="param-item"><span class="param-label">网址</span><span class="param-value" id="incog-url" style="font-size:11px;word-break:break-all;">-</span></div>
        <div class="param-item"><span class="param-label">时间窗</span><span class="param-value" id="incog-timewin">-</span></div>
        <div class="param-item"><span class="param-label">访问间隔</span><span class="param-value" id="incog-interval">-</span></div>
        <div class="param-item"><span class="param-label">页面停留</span><span class="param-value" id="incog-stay">-</span></div>
        <div class="param-item"><span class="param-label">已访问</span><span class="param-value" id="incog-visited">0 次</span></div>
        <div class="param-item"><span class="param-label">下次访问</span><span class="param-value warn" id="incog-next">-</span></div>
      </div>
    </div>

    <div class="panel incognito-log-panel" style="margin:0 8px 8px 8px;">
      <div class="panel-header">
        🕶️ 无痕浏览日志
        <span class="badge" id="incognito-log-count">0 条</span>
        <span id="incognito-summary" style="margin-left:auto;font-size:11px;color:#8899aa;"></span>
      </div>
      <div class="log-content" id="incognito-log-content"></div>
    </div>
  </div>
</div>

<!-- 配置编辑器遮罩 -->
<div class="overlay" id="config-overlay">
  <div class="overlay-content">
    <div class="overlay-header">
      ✏️ 编辑 config.yml
      <button class="close-btn" onclick="closeEditor()">&times;</button>
    </div>
    <div class="overlay-body">
      <textarea id="config-editor"></textarea>
    </div>
    <div class="overlay-footer">
      <span id="save-status" style="flex:1;font-size:12px;color:#f5a623;"></span>
      <button class="btn btn-secondary" onclick="closeEditor()">取消</button>
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
  </div>
</div>

<!-- 无痕配置编辑器遮罩 -->
<div class="overlay" id="incognito-overlay">
  <div class="overlay-content" style="max-width:480px;">
    <div class="overlay-header">
      🕶️ 编辑无痕配置
      <button class="close-btn" onclick="closeIncognitoEditor()">&times;</button>
    </div>
    <div class="overlay-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;">
        <div style="grid-column:1/-1;">
          <label style="color:#8899aa;display:block;margin-bottom:4px;">网址</label>
          <input id="ince-url" style="width:100%;background:#0a0f16;color:#e0e0e0;border:1px solid #1e2d3d;border-radius:4px;padding:6px 8px;">
        </div>
        <div>
          <label style="color:#8899aa;display:block;margin-bottom:4px;">工作时间 开始</label>
          <input id="ince-ws" type="number" min="0" max="23" style="width:100%;background:#0a0f16;color:#e0e0e0;border:1px solid #1e2d3d;border-radius:4px;padding:6px 8px;">
        </div>
        <div>
          <label style="color:#8899aa;display:block;margin-bottom:4px;">工作时间 结束</label>
          <input id="ince-we" type="number" min="0" max="24" style="width:100%;background:#0a0f16;color:#e0e0e0;border:1px solid #1e2d3d;border-radius:4px;padding:6px 8px;">
        </div>
        <div>
          <label style="color:#8899aa;display:block;margin-bottom:4px;">访问间隔(min) 最小</label>
          <input id="ince-ilo" type="number" min="1" style="width:100%;background:#0a0f16;color:#e0e0e0;border:1px solid #1e2d3d;border-radius:4px;padding:6px 8px;">
        </div>
        <div>
          <label style="color:#8899aa;display:block;margin-bottom:4px;">访问间隔(min) 最大</label>
          <input id="ince-ihi" type="number" min="1" style="width:100%;background:#0a0f16;color:#e0e0e0;border:1px solid #1e2d3d;border-radius:4px;padding:6px 8px;">
        </div>
        <div>
          <label style="color:#8899aa;display:block;margin-bottom:4px;">停留(s) 最小</label>
          <input id="ince-slo" type="number" min="1" style="width:100%;background:#0a0f16;color:#e0e0e0;border:1px solid #1e2d3d;border-radius:4px;padding:6px 8px;">
        </div>
        <div>
          <label style="color:#8899aa;display:block;margin-bottom:4px;">停留(s) 最大</label>
          <input id="ince-shi" type="number" min="1" style="width:100%;background:#0a0f16;color:#e0e0e0;border:1px solid #1e2d3d;border-radius:4px;padding:6px 8px;">
        </div>
      </div>
    </div>
    <div class="overlay-footer">
      <span id="ince-save-status" style="flex:1;font-size:12px;color:#f5a623;"></span>
      <button class="btn btn-secondary" onclick="closeIncognitoEditor()">取消</button>
      <button class="btn btn-primary" onclick="saveIncognitoConfig()">保存</button>
    </div>
  </div>
</div>

<script>
// ---------- 参数渲染 ----------
function renderParams(data) {
  const g = data.config_gobal;
  const html = [
    {label: "论坛", value: g.Host, cls: ""},
    {label: "板块 (Fid)", value: (g.Fids || []).join(", "), cls: ""},
    {label: "扫描页数", value: g.ScanPages, cls: ""},
    {label: "回复数限制", value: g.ReplyLimit, cls: ""},
    {label: "回复间隔", value: `${g.TimeIntervalStart}~${g.TimeIntervalEnd}s`, cls: ""},
    {label: "轮询间隔", value: `${g.PollingMin}~${g.PollingMax}s`, cls: ""},
    {label: "Bark 推送", value: g.BarkUrl ? "已启用" : "未配置", cls: g.BarkUrl ? "ok" : "warn"},
    {label: "代理", value: g.Proxy ? "已启用" : "禁用", cls: ""},
    {label: "点赞", value: g.Like ? "已启用" : "禁用", cls: ""},
    {label: "回复内容数", value: (g.ReplyContent || []).length + " 条", cls: ""},
  ];
  document.getElementById("params-grid").innerHTML = html.map(p =>
    `<div class="param-item">
       <span class="param-label">${p.label}</span>
       <span class="param-value ${p.cls}">${p.value}</span>
     </div>`
  ).join("");
}

// ---------- SSE 主日志流 ----------
const logContent = document.getElementById("log-content");

function appendLog(line) {
  const level = line.match(/\[(INFO|WARNING|ERROR|DEBUG)\]/)?.[1] || "INFO";
  const div = document.createElement("div");
  div.className = "log-line";
  div.setAttribute("level", level);
  div.textContent = line;
  logContent.appendChild(div);
  logContent.scrollTop = logContent.scrollHeight;
  document.getElementById("log-count").textContent = logContent.children.length + " 条";
}

function connectLogStream() {
  const evtSource = new EventSource("/api/log");
  evtSource.onmessage = function(e) {
    const data = JSON.parse(e.data);
    appendLog(data.text);
  };
  evtSource.onerror = function() {
    setTimeout(connectLogStream, 2000);
  };
}

// ---------- SSE 无痕日志流 ----------
const incogLogContent = document.getElementById("incognito-log-content");

function appendIncognitoLog(line) {
  const level = line.match(/\[(INFO|WARNING|ERROR|DEBUG)\]/)?.[1] || "INFO";
  const div = document.createElement("div");
  div.className = "log-line";
  div.setAttribute("level", level);
  div.textContent = line;
  incogLogContent.appendChild(div);
  incogLogContent.scrollTop = incogLogContent.scrollHeight;
  document.getElementById("incognito-log-count").textContent = incogLogContent.children.length + " 条";
}

function connectIncognitoLogStream() {
  const evtSource = new EventSource("/api/incognito_log");
  evtSource.onmessage = function(e) {
    const data = JSON.parse(e.data);
    // 清空信号：页面重连时清掉旧日志
    if (data.clear) {
      incogLogContent.innerHTML = "";
      document.getElementById("incognito-log-count").textContent = "0 条";
      return;
    }
    appendIncognitoLog(data.text);
  };
  evtSource.onerror = function() {
    setTimeout(connectIncognitoLogStream, 2000);
  };
}

// ---------- 状态轮询 ----------
function updateStatus() {
  fetch("/api/status")
    .then(r => r.json())
    .then(data => {
      // 状态点
      const dot = document.getElementById("status-dot");
      const st = document.getElementById("status-text");
      st.textContent = data.status;
      dot.className = "status-dot " + (
        data.status.includes("等待") || data.status.includes("休眠") ? "sleeping" :
        data.status.includes("错误") || data.status.includes("失败") ? "error" :
        "running"
      );

      // 运行时
      document.getElementById("runtime-badge").textContent = data.runtime;

      // 回复统计
      document.getElementById("status-reply").textContent =
        `回复: ${data.total_reply_success}/${data.total_reply_sent}`;

      // 今日已回复
      const todayEl = document.getElementById("status-today");
      const limit = data.daily_limit || 0;
      if (limit > 0) {
        todayEl.textContent = `今日 ${data.today_reply || 0}/${limit}`;
      } else if (limit === -1) {
        todayEl.textContent = `今日 ${data.today_reply || 0}/∞`;
      } else {
        todayEl.textContent = "";
      }
      document.getElementById("status-pending").textContent =
        `待回复: ${data.pending_replies}`;

      // 用户信息面板
      const ui = data.user_info || {};
      if (ui.name || ui.title) {
        document.getElementById("ui-title").textContent = ui.name ? (ui.title ? `${ui.name} (${ui.title})` : ui.name) : (ui.title || "-");
        document.getElementById("ui-posts").textContent = ui.posts || "?";
        document.getElementById("ui-pres").textContent = ui.pres || "?";
        document.getElementById("ui-usd").textContent = ui.usd || "?";
        document.getElementById("ui-contribution").textContent = ui.contribution || "?";
        document.getElementById("userinfo-time").textContent = ui.last_update || "-";
      }

      // 无痕浏览摘要
      const incog = data.incognito || {};
      const incogSummary = document.getElementById("incognito-summary");
      if (incog.enabled) {
        incogSummary.textContent = `${incog.status}`;
        // 参数面板
        const ic = incog.config || {};
        window._lastIncogConfig = ic;
        document.getElementById("incog-url").textContent = ic.url || "-";
        document.getElementById("incog-timewin").textContent = (ic.work_start !== undefined && ic.work_end !== undefined) ? `${ic.work_start}:00~${ic.work_end}:00` : "-";
        document.getElementById("incog-interval").textContent = (ic.interval_min && ic.interval_max) ? `${ic.interval_min/60}~${ic.interval_max/60}min` : "-";
        document.getElementById("incog-stay").textContent = (ic.stay_min && ic.stay_max) ? `${ic.stay_min}~${ic.stay_max}s` : "-";
        document.getElementById("incog-visited").textContent = `${incog.visit_count} 次`;
        // 下次访问倒计时
        const nextEl = document.getElementById("incog-next");
        if (incog.next_countdown > 0) {
          const m = Math.floor(incog.next_countdown / 60);
          const s = incog.next_countdown % 60;
          nextEl.textContent = `${m}min${s}s`;
          nextEl.className = "param-value";
        } else {
          nextEl.textContent = "-";
          nextEl.className = "param-value";
        }
        document.getElementById("incognito-state-badge").textContent = incog.status || "运行中";
      } else {
        incogSummary.textContent = "未启用";
        document.getElementById("incognito-state-badge").textContent = "未启用";
      }

      // 参数
      renderParams(data);

      // 时间窗状态（只更新显示，不覆盖输入框）
      document.getElementById("work-status-badge").textContent = data.work_window_text;

      // 倒计时：更新基准值（仅在变化大于2秒时才覆盖，避免陈旧值覆盖本地平滑递减）
      const sv = data.next_reply_countdown || 0;
      if (sv > 0) {
        if (!window._cdRef || Math.abs(sv - window._cdRef.value) > 2) {
          window._cdRef = { value: sv, timestamp: Date.now() };
        }
      } else {
        window._cdRef = null;
        document.getElementById("countdown-display").textContent = "";
      }
    })
    .catch(() => {});
}

// ---------- 定时设置 ----------
function saveWorkTime() {
  const start = parseInt(document.getElementById("work-start").value) || 0;
  const end = parseInt(document.getElementById("work-end").value) || 24;
  if (start >= end) { alert("开始时间必须小于结束时间"); return; }
  fetch("/api/worktime", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({start, end}),
  })
    .then(r => r.json())
    .then(d => {
      if (!d.ok) { alert(d.message); return; }
      // 保存成功提示
      const btn = document.querySelector('button[onclick="saveWorkTime()"]');
      const orig = btn.textContent;
      btn.textContent = "已保存";
      btn.style.background = "#2e7d32";
      setTimeout(() => { btn.textContent = orig; btn.style.background = ""; }, 2000);
    })
    .catch(e => alert("保存失败: " + e));
}

// ---------- 配置编辑器 ----------
function openEditor() {
  document.getElementById("config-overlay").classList.add("active");
  document.getElementById("save-status").textContent = "";
  fetch("/api/config")
    .then(r => r.text())
    .then(text => {
      document.getElementById("config-editor").value = text;
    });
}

function closeEditor() {
  document.getElementById("config-overlay").classList.remove("active");
}

function saveConfig() {
  const content = document.getElementById("config-editor").value;
  document.getElementById("save-status").textContent = "保存中...";
  fetch("/api/config", {
    method: "POST",
    body: content,
  })
    .then(r => r.json())
    .then(data => {
      document.getElementById("save-status").textContent = data.message;
      if (data.ok) {
        setTimeout(closeEditor, 1500);
      }
    })
    .catch(e => {
      document.getElementById("save-status").textContent = "保存失败: " + e;
    });
}

// ---------- 无痕配置编辑器 ----------
function openIncognitoEditor() {
  // 从当前显示数据填充
  const ic = window._lastIncogConfig || {};
  document.getElementById("ince-url").value = ic.url || "";
  document.getElementById("ince-ws").value = ic.work_start ?? 8;
  document.getElementById("ince-we").value = ic.work_end ?? 23;
  document.getElementById("ince-ilo").value = ic.interval_min ? ic.interval_min/60 : 60;
  document.getElementById("ince-ihi").value = ic.interval_max ? ic.interval_max/60 : 120;
  document.getElementById("ince-slo").value = ic.stay_min || 10;
  document.getElementById("ince-shi").value = ic.stay_max || 60;
  document.getElementById("ince-save-status").textContent = "";
  document.getElementById("incognito-overlay").classList.add("active");
}

function closeIncognitoEditor() {
  document.getElementById("incognito-overlay").classList.remove("active");
}

function saveIncognitoConfig() {
  const data = {
    url: document.getElementById("ince-url").value,
    work_start: parseInt(document.getElementById("ince-ws").value) || 8,
    work_end: parseInt(document.getElementById("ince-we").value) || 23,
    interval_min: (parseInt(document.getElementById("ince-ilo").value) || 60) * 60,
    interval_max: (parseInt(document.getElementById("ince-ihi").value) || 120) * 60,
    stay_min: parseInt(document.getElementById("ince-slo").value) || 10,
    stay_max: parseInt(document.getElementById("ince-shi").value) || 60,
  };
  document.getElementById("ince-save-status").textContent = "保存中...";
  fetch("/api/incognito_config", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data),
  })
    .then(r => r.json())
    .then(d => {
      document.getElementById("ince-save-status").textContent = d.message;
      if (d.ok) {
        setTimeout(closeIncognitoEditor, 1500);
      }
    })
    .catch(e => {
      document.getElementById("ince-save-status").textContent = "保存失败: " + e;
    });
}

// ---------- 倒计时：基于基准值+本地时钟递减 ----------
function tickCountdown() {
  if (!window._cdRef) return;
  const elapsed = Math.floor((Date.now() - window._cdRef.timestamp) / 1000);
  const remaining = Math.max(0, window._cdRef.value - elapsed);
  if (remaining <= 0) {
    document.getElementById("countdown-display").textContent = "";
    return;
  }
  const hh = Math.floor(remaining / 3600);
  const mm = Math.floor((remaining % 3600) / 60);
  const ss = remaining % 60;
  document.getElementById("countdown-display").textContent =
    "⏳ " + (hh > 0 ? hh+"h"+String(mm).padStart(2,"0")+"m" : mm+"m"+String(ss).padStart(2,"0")+"s");
}
setInterval(tickCountdown, 1000);

// ---------- 启动 ----------
connectLogStream();
connectIncognitoLogStream();

// 页面加载时从后端读取当前时间窗设置
fetch("/api/status").then(r => r.json()).then(data => {
  document.getElementById("work-start").value = data.work_time_start;
  document.getElementById("work-end").value = data.work_time_end;
});

setInterval(updateStatus, 2000);
updateStatus();
</script>
